<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Français-Fon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="dot"></span>
                <h1>Chatbot <span>Société</span></h1>
            </div>
            <div class="lang-selector">
                <button id="lang-fr" class="active">FR</button>
                <button id="lang-fon">FON</button>
            </div>
            <div class="status">En ligne</div>
        </header>

        <main id="chat-window">
            <div class="message assistant">
                <div class="bubble">
                    Bonjour ! Je suis l'assistant du projet de société. Comment puis-je vous aider ?
                    <br><em id="welcome-fon">Ku do dágbe ! Nɛ̌ un ka sixú d'alɔ we gbɔn sɔn ?</em>
                </div>
                <div class="time">Maintenant</div>
            </div>
        </main>

        <footer>
            <div class="input-area">
                <button id="mic-btn" title="Parler">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <input type="text" id="user-input" placeholder="Posez votre question..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>
    <script src="knowledge.js"></script>
    <script src="app.js"></script>
</body>
</html>
