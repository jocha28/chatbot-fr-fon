<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Français-Fon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="dot"></span>
                <h1>Chatbot <span>Fon</span></h1>
            </div>
            <div class="status">En ligne</div>
        </header>

        <main id="chat-window">
            <div class="message assistant">
                <div class="bubble">
                    Bonjour ! Je suis votre assistant Fon. Comment puis-je vous aider aujourd'hui ?
                    <br><em>Ku do dágbe ! Nɛ̌ agbaza towe tɛ nɔ ?</em>
                </div>
                <div class="time">Maintenant</div>
            </div>
        </main>

        <footer>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Tapez votre message ici..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
